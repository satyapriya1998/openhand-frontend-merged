<nav class="hrms-breadcrumb" aria-label="Breadcrumb">
  <ng-container *ngFor="let item of breadcrumbs; let last = last; let first = first">
    <fa-icon *ngIf="!first" [icon]="faChevronRight" class="sep-icon"></fa-icon>

    <a *ngIf="!last" [routerLink]="item.route" class="crumb-link">
      <fa-icon *ngIf="first" [icon]="faHouse" class="home-icon"></fa-icon>

      <span *ngIf="!first">
        {{ item.label }}
      </span>
    </a>

    <span *ngIf="last" class="crumb-current">
      {{ item.label }}
    </span>
  </ng-container>
</nav>
