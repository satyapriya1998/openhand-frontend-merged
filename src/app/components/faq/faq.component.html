<section id="resources" class="relative py-12 sm:py-16">
  <div class="pointer-events-none absolute inset-0 -z-10 dot-pattern opacity-30"></div>
  <div class="mx-auto max-w-3xl px-6">
    <app-section-heading
      eyebrow="FAQ"
      title="Frequently Asked Questions"
      description="Everything you need to know about Knodtecone. Can't find an answer? Reach out to our team."
    />

    <!-- Search -->
    <div class="mt-10">
      <label class="relative block">
        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-muted-foreground">
          <i class="fa-solid fa-magnifying-glass text-sm"></i>
        </span>
        <input
          type="search"
          [value]="query()"
          (input)="setQuery($any($event.target).value)"
          placeholder="Search FAQs…"
          class="w-full rounded-xl border border-border bg-card/60 py-3 pl-10 pr-4 text-sm text-foreground outline-none backdrop-blur transition-colors focus:border-primary"
        />
      </label>
      <p class="mt-2 text-xs text-muted-foreground">
        @if (query()) {
          Showing {{ filtered().length }} of {{ faqs.length }} results
        } @else {
          {{ faqs.length }} questions
        }
      </p>
    </div>

    <div class="mt-6 space-y-3">
      @for (faq of filtered(); track faq.q; let i = $index) {
        <div class="glass overflow-hidden rounded-xl backdrop-blur-xl" appReveal="up" [delay]="i * 40">
          <button
            type="button"
            (click)="toggle(i)"
            class="flex w-full items-center justify-between gap-4 p-5 text-left"
            [attr.aria-expanded]="isOpen(i)"
          >
            <span class="flex min-w-0 items-center gap-3">
              <span class="rounded-md bg-primary/15 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-primary">
                {{ faq.cat }}
              </span>
              <span class="font-medium text-foreground">{{ faq.q }}</span>
            </span>
            <i
              class="fa-solid fa-plus shrink-0 text-lg text-primary transition-transform duration-200"
              [class.rotate-45]="isOpen(i)"
            ></i>
          </button>
          @if (isOpen(i)) {
            <p class="px-5 pb-5 text-sm leading-relaxed text-muted-foreground">{{ faq.a }}</p>
          }
        </div>
      }
      @if (filtered().length === 0) {
        <div class="glass rounded-xl p-8 text-center">
          <i class="fa-solid fa-circle-question text-2xl text-muted-foreground"></i>
          <p class="mt-3 text-sm text-muted-foreground">No questions match &ldquo;{{ query() }}&rdquo;.</p>
          <a href="#contact" class="mt-3 inline-flex items-center gap-1.5 text-sm font-semibold text-primary hover:underline">
            Contact support <i class="fa-solid fa-arrow-right text-xs"></i>
          </a>
        </div>
      }
    </div>
  </div>
</section>
