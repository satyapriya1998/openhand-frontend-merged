<div class="mx-auto max-w-2xl text-center">
  @if (eyebrow) {
    <span class="text-xs font-semibold uppercase tracking-widest text-primary">
      {{ eyebrow }}
    </span>
  }
  <h2 class="mt-3 text-balance text-3xl font-bold tracking-tight sm:text-4xl">
    {{ title }}
  </h2>
  @if (description) {
    <p class="mx-auto mt-4 max-w-xl text-pretty leading-relaxed text-muted-foreground">
      {{ description }}
    </p>
  }
</div>
