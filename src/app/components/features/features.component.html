<section id="features" class="relative px-4 py-12 sm:px-6 lg:px-8">
  <div class="pointer-events-none absolute inset-0 -z-10 dot-pattern opacity-40"></div>

  <div class="mx-auto max-w-7xl">
    <app-section-heading
      [eyebrow]="locale.t().features.eyebrow"
      [title]="locale.t().features.title"
      [description]="locale.t().features.description"
    />

    <div class="mt-14 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (feature of features; track feature.title; let i = $index) {
        <div
          appSpotlight
          appReveal="up"
          [delay]="i * 60"
          class="glass group relative flex flex-col overflow-hidden rounded-2xl border border-border p-5 transition-all duration-300 hover:-translate-y-1 hover:border-primary/40 hover:shadow-2xl sm:p-6"
        >
          <div class="absolute inset-0 -z-10">
    <div class="absolute -right-12 -top-12 size-32 rounded-full bg-primary/10 opacity-0 blur-2xl transition-opacity duration-500 group-hover:opacity-100"></div>
  </div>

          <div class="flex items-start justify-between">
            <span class="flex size-12 items-center justify-center rounded-xl bg-gradient-to-br ring-1 ring-inset {{ feature.tint }} ring-current/20">
              <i class="fa-solid {{ feature.icon }} text-lg"></i>
            </span>
            <span class="rounded-full bg-secondary px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider text-muted-foreground">
              {{ feature.tag }}
            </span>
          </div>

          <h3 class="mt-4 text-h3 text-foreground">{{ feature.title }}</h3>
          <ul class="mt-3 flex-1 space-y-2">
      @for (point of feature.points; track point) {
              <li class="flex items-start gap-2 text-sm text-muted-foreground min-w-0">
                <span class="mt-1.5 size-1.5 shrink-0 rounded-full bg-primary"></span>
                <span class="min-w-0 break-words">{{ point }}</span>
              </li>
            }
          </ul>

          <div class="mt-4 flex items-center gap-1.5 text-xs font-semibold text-primary opacity-0 transition-opacity group-hover:opacity-100">
            Learn more
            <i class="fa-solid fa-arrow-right text-[10px] transition-transform group-hover:translate-x-0.5"></i>
          </div>
        </div>
      }
    </div>
  </div>
</section>
